name: Github ACtions Test Secret Usage

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret safely
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |      
          if [ -z "$API_KEY" ]; then
            echo "Secret missing"
            exit 1
          fi
      
          curl -s -H "Authorization: Bearer $API_KEY" https://httpbin.org/get > /dev/null
      
          echo "Done"
