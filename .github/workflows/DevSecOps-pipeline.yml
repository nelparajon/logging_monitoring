name: DevSecOps Pipeline
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "Build OK"

  security-audit:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r . -lll

  deploy:
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - name: Deploy
        run: echo "Deploy ejecutado"
